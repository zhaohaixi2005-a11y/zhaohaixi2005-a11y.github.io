<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haixi | GitHub Pages</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(135deg, #f6f8fa 0%, #e6edf3 100%);
        color: #0b1f33;
      }
      main {
        text-align: center;
        background: #ffffff;
        border: 1px solid #d0d7de;
        border-radius: 16px;
        padding: 40px 28px;
        box-shadow: 0 10px 30px rgba(11, 31, 51, 0.08);
        width: min(680px, calc(100vw - 48px));
      }
      h1 { margin: 0 0 10px; font-size: clamp(28px, 5vw, 42px); }
      p { margin: 0; font-size: 18px; line-height: 1.6; }
      code {
        background: #f6f8fa;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        padding: 3px 8px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, I'm Haixi</h1>
      <p>This site is live on GitHub Pages.</p>
      <p>Repository: <code>zhaohaixi2005-a11y.github.io</code></p>
    </main>
  </body>
</html>
